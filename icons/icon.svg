<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0c0c10"/>
  <!-- Ring track -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#8b6df0" stroke-width="26" opacity="0.18"/>
  <!-- Ring arc ~75% filled -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#8b6df0" stroke-width="26"
    stroke-linecap="round"
    stroke-dasharray="1193.81" stroke-dashoffset="298.45"
    transform="rotate(-90 256 256)"
    filter="url(#glow)"/>
  <!-- Time text -->
  <text x="256" y="276"
    text-anchor="middle" dominant-baseline="middle"
    fill="#f6f6f8" font-family="monospace" font-weight="800" font-size="108"
    letter-spacing="-2">5:00</text>
</svg>
